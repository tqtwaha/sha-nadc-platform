name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -w turbo run typecheck --filter='!@sha-nadc/mobile'

      - name: Test (unit)
        run: pnpm -w turbo run test --filter='!@sha-nadc/mobile' --filter='!@sha-nadc/web'

      - name: Build web
        run: pnpm -w turbo run build --filter=@sha-nadc/web
        env:
          # Use placeholders so build doesn't fail on missing env vars.
          # Real secrets only live in Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key

  lockfile-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify pnpm-lock.yaml is in sync
        run: pnpm install --frozen-lockfile --ignore-scripts
